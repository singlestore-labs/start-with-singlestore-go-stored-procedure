services:
  singlestore:
    image: ghcr.io/singlestore-labs/singlestoredb-dev:latest
    platform: linux/amd64
    ports:
    - 3306:3306
    - 8080:8080
    - 9000:9000
    volumes:
    # persist data between runs:
    - db-data:/data
    - ./init.sql:/init.sql
    environment:
    - ROOT_PASSWORD=password_here
    # Optional; the dev image runs without a license on up to 8 cores / 64GB RAM:
    # - SINGLESTORE_LICENSE=${SINGLESTORE_LICENSE}

volumes:
  db-data:
